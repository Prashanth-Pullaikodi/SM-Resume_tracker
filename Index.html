<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>Resort Recruitment</title>
<link rel="manifest" href="?page=manifest">
<link rel="apple-touch-icon" href="https://www.gstatic.com/images/branding/product/2x/forms_2020q4_48dp.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root { --brand: #0d6efd; --brand-dark: #0a58ca; }
  html, body { height: 100%; }
  body {
    background: #f6f8fb;
    padding-bottom: 80px;
    -webkit-tap-highlight-color: transparent;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .app-header {
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    padding: 18px 16px 14px;
    border-radius: 0 0 18px 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,.08);
    position: sticky; top: 0; z-index: 50;
  }
  .app-header h5 { margin: 0; font-weight: 600; }
  .app-header small { opacity: .85; }
  .kpi-card {
    border: none; border-radius: 16px;
    box-shadow: 0 2px 10px rgba(15,23,42,.06);
    background: #fff; height: 100%;
  }
  .kpi-card .label { font-size: .78rem; color: #64748b; text-transform: uppercase; letter-spacing: .5px; }
  .kpi-card .value { font-size: 1.7rem; font-weight: 700; color: #0f172a; }
  .kpi-card .icon { font-size: 1.5rem; opacity: .8; }
  .alert-screen {
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg,#fff7ed,#ffedd5);
    color: #9a3412;
    cursor: pointer;
  }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    display: flex; justify-content: space-around;
    z-index: 100;
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
  }
  .bottom-nav button {
    flex: 1; background: none; border: 0;
    padding: 8px 0; color: #64748b; font-size: .72rem;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .bottom-nav button.active { color: var(--brand); }
  .bottom-nav button i { font-size: 1.3rem; }
  .candidate-row {
    background: #fff; border-radius: 14px; padding: 12px 14px;
    margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .badge-status { font-size: .68rem; padding: 4px 8px; border-radius: 999px; }
  .b-New { background: #e0f2fe; color: #075985; }
  .b-NotScreened { background: #fef3c7; color: #92400e; }
  .b-Shortlisted { background: #e0e7ff; color: #3730a3; }
  .b-Interviewed { background: #f1f5f9; color: #334155; }
  .b-Selected { background: #dcfce7; color: #166534; }
  .b-Rejected { background: #fee2e2; color: #991b1b; }
  .b-OnHold { background: #f3f4f6; color: #374151; }
  .funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .funnel-bar { background: var(--brand); color: #fff; height: 28px; border-radius: 6px;
    display: flex; align-items: center; padding: 0 10px; font-size: .8rem; min-width: 60px; }
  .role-bar { background: #e0e7ff; height: 22px; border-radius: 6px; position: relative; }
  .role-bar > span { display:block; height:100%; background: var(--brand); border-radius:6px; }
  .modal-content { border-radius: 18px; }
  .btn-fab {
    position: fixed; right: 18px; bottom: 88px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--brand); color: #fff; border: 0;
    box-shadow: 0 6px 18px rgba(13,110,253,.35);
    font-size: 1.6rem; z-index: 60;
  }
  .skeleton { background: linear-gradient(90deg,#eef2f7,#f8fafc,#eef2f7); background-size: 200% 100%;
    animation: sk 1.2s infinite; border-radius: 8px; height: 60px; margin-bottom: 8px; }
  @keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cv-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .cv-table th, .cv-table td { padding: 10px 8px; font-size: .85rem; vertical-align: middle; }
  .cv-table thead th {
    position: sticky; top: 0; background: #f1f5f9; color: #475569;
    font-weight: 600; text-transform: uppercase; font-size: .68rem;
    letter-spacing: .5px; border-bottom: 1px solid #e5e7eb;
  }
  .cv-table tbody tr { background: #fff; cursor: pointer; }
  .cv-table tbody tr:hover { background: #f8fafc; }
  .cv-table tbody td { border-bottom: 1px solid #f1f5f9; }
  .chip-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    border: 1px solid #e5e7eb; background: #fff; color: #475569;
    padding: 6px 12px; border-radius: 999px; font-size: .8rem;
    white-space: nowrap; cursor: pointer;
  }
  .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .cv-name { font-weight: 600; color: #0f172a; }
  .cv-meta { color: #64748b; font-size: .75rem; }
  .cv-link { color: var(--brand); text-decoration: none; }
  .denied {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 30px; text-align: center; color: #475569;
  }
  .denied i { font-size: 3rem; color: #ef4444; margin-bottom: 12px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN / ACCESS DENIED -->
<div id="gate" class="denied hidden">
  <i class="bi bi-shield-exclamation"></i>
  <h4>Access Denied</h4>
  <p id="gateMsg" class="text-muted"></p>
  <button class="btn btn-outline-primary" onclick="bootApp()">Retry</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="app-header">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h5 id="screenTitle">Dashboard</h5>
        <small id="userInfo"></small>
      </div>
      <button id="refreshBtn" class="btn btn-sm text-white" onclick="refreshFromServer()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
  </header>

  <main class="container py-3" id="mainArea"></main>

  <button id="fab" class="btn-fab hidden" onclick="openAddCandidateModal()"><i class="bi bi-plus-lg"></i></button>

  <nav class="bottom-nav">
    <button data-view="dashboard" onclick="navigate('dashboard')"><i class="bi bi-house"></i>Home</button>
    <button data-view="candidates" onclick="navigate('candidates')"><i class="bi bi-people"></i>Candidates</button>
    <button data-view="interviews" onclick="navigate('interviews')"><i class="bi bi-calendar-check"></i>Interviews</button>
    <button data-view="analytics" onclick="navigate('analytics')"><i class="bi bi-graph-up"></i>Analytics</button>
    <button data-view="profile" onclick="navigate('profile')"><i class="bi bi-person-circle"></i>Profile</button>
  </nav>
</div>

<!-- ADD CANDIDATE MODAL -->
<div class="modal fade" id="candidateModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Candidate</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="candidateForm" onsubmit="submitCandidate(event)">
          <div class="mb-2"><label class="form-label">Name *</label><input class="form-control" name="Name" required></div>
          <div class="row g-2">
            <div class="col-6 mb-2"><label class="form-label">Phone</label><input class="form-control" name="Phone"></div>
            <div class="col-6 mb-2"><label class="form-label">Email</label><input class="form-control" type="email" name="Email"></div>
          </div>
          <div class="mb-2"><label class="form-label">Role Applied</label><input class="form-control" name="RoleApplied" placeholder="e.g. Front Desk, Chef"></div>
          <div class="mb-2"><label class="form-label">Source</label><input class="form-control" name="Source" placeholder="Referral, Naukri, Walk-in"></div>
          <div class="mb-2"><label class="form-label">Resume Link <span class="text-muted small">(optional)</span></label>
            <input class="form-control" name="ResumeLink" placeholder="https://drive.google.com/..."></div>
          <div class="mb-2"><label class="form-label">Upload Resume <span class="text-muted small">(PDF, DOC, image — max 25 MB)</span></label>
            <input class="form-control" type="file" name="ResumeFile" id="newResumeFile"
                   accept=".pdf,.doc,.docx,.rtf,.txt,.odt,.png,.jpg,.jpeg,.webp,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/*">
            <div class="form-text">If both link and file are provided, the uploaded file wins.</div>
          </div>
          <div class="mb-2"><label class="form-label">Status</label>
            <select class="form-select" name="Status">
              <option>New</option><option>Not Screened</option><option>Shortlisted</option>
            </select>
          </div>
          <button class="btn btn-primary w-100 mt-2" type="submit">Save Candidate</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- CANDIDATE DETAIL MODAL -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Candidate Detail</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>
</div>

<!-- INTERVIEW MODAL -->
<div class="modal fade" id="interviewModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Schedule Interview</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="interviewForm" onsubmit="submitInterview(event)">
          <input type="hidden" name="CandidateID">
          <div class="mb-2"><label class="form-label">Round</label>
            <select class="form-select" name="Round" required>
              <option>HR</option><option>Technical</option><option>Manager</option>
            </select></div>
          <div class="mb-2"><label class="form-label">Interviewer Email</label><input class="form-control" name="Interviewer" type="email" required></div>
          <div class="mb-2"><label class="form-label">Date & Time</label><input class="form-control" name="DateTime" type="datetime-local" required></div>
          <div class="mb-2"><label class="form-label">Status</label>
            <select class="form-select" name="Status"><option>Scheduled</option><option>Completed</option><option>Cancelled</option></select></div>
          <button class="btn btn-primary w-100 mt-2" type="submit">Save Interview</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- FEEDBACK MODAL -->
<div class="modal fade" id="feedbackModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Interview Feedback</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="feedbackForm" onsubmit="submitFeedback(event)">
          <input type="hidden" name="InterviewID">
          <div class="mb-2"><label class="form-label">Score (1–10)</label>
            <input class="form-control" name="Score" type="number" min="1" max="10" required></div>
          <div class="mb-2"><label class="form-label">Status</label>
            <select class="form-select" name="Status"><option>Completed</option><option>Cancelled</option></select></div>
          <div class="mb-2"><label class="form-label">Feedback</label>
            <textarea class="form-control" name="Feedback" rows="4" required></textarea></div>
          <button class="btn btn-primary w-100" type="submit">Save Feedback</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============================================================
// STATE  (single-shot cache; navigation renders from this, no refetch)
// ============================================================
const state = {
  user: null,
  view: 'dashboard',
  candidates: [],
  interviews: [],
  kpis: null,
  metrics: null,
  roleStats: [],
  filters: { status: 'PENDING', q: '' }, // default: New + Not Screened
  loaded: false,
  refreshing: false
};

// ============================================================
// API HELPER (wraps google.script.run with promises)
// ============================================================
function api(fn, ...args) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err => reject(err))
      [fn](...args);
  });
}

function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `position-fixed top-0 start-50 translate-middle-x mt-3 alert alert-${type} shadow`;
  t.style.zIndex = 9999;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
// BOOT (single round-trip; caches everything for instant navigation)
// ============================================================
async function bootApp() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  try {
    const boot = await api('bootstrapApp');
    if (!boot.user || !boot.user.authorized) {
      document.getElementById('gateMsg').textContent =
        (boot.user && boot.user.message) || 'Access Denied';
      document.getElementById('gate').classList.remove('hidden');
      return;
    }
    applyBoot(boot);
    document.getElementById('userInfo').textContent = `${state.user.name} · ${state.user.role}`;
    document.getElementById('app').classList.remove('hidden');
    applyRoleVisibility();
    navigate('dashboard');
    registerSw();
  } catch (e) {
    document.getElementById('gateMsg').textContent = (e && e.message) || 'Failed to load.';
    document.getElementById('gate').classList.remove('hidden');
  }
}

function applyBoot(boot) {
  state.user = boot.user;
  state.candidates = boot.candidates || [];
  state.interviews = boot.interviews || [];
  state.kpis = boot.kpis || null;
  state.metrics = boot.metrics || null;
  state.roleStats = boot.roleStats || [];
  state.loaded = true;
}

// Background refresh — no skeleton, no flicker.
async function refreshFromServer() {
  if (state.refreshing) return;
  state.refreshing = true;
  const icon = document.querySelector('#refreshBtn i');
  if (icon) icon.classList.add('spin');
  try {
    const boot = await api('bootstrapApp');
    if (boot.user && boot.user.authorized) {
      applyBoot(boot);
      renderView();
    }
  } catch (e) {
    toast(e.message || 'Refresh failed.', 'danger');
  } finally {
    state.refreshing = false;
    if (icon) icon.classList.remove('spin');
  }
}

function applyRoleVisibility() {
  const p = state.user.permissions || {};
  document.getElementById('fab').classList.toggle('hidden', !p.addCandidate);
}

// ============================================================
// ROUTER
// ============================================================
function navigate(view) {
  state.view = view;
  document.querySelectorAll('.bottom-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  document.getElementById('fab').classList.toggle('hidden',
    view !== 'candidates' || !state.user.permissions.addCandidate);
  const titles = { dashboard:'Dashboard', candidates:'Candidates', interviews:'Interviews',
                   analytics:'Analytics', profile:'Profile' };
  document.getElementById('screenTitle').textContent = titles[view] || '';
  renderView();
}

function refreshAll() { refreshFromServer(); }

// Synchronous render from cache — no network = instant.
function renderView() {
  const m = document.getElementById('mainArea');
  try {
    if (!state.loaded) {
      m.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
      return;
    }
    if (state.view === 'dashboard') return renderDashboard(m);
    if (state.view === 'candidates') return renderCandidates(m);
    if (state.view === 'interviews') return renderInterviews(m);
    if (state.view === 'analytics') return renderAnalytics(m);
    if (state.view === 'profile') return renderProfile(m);
  } catch (e) {
    m.innerHTML = `<div class="alert alert-danger">${(e && e.message) || 'Error loading view.'}</div>`;
  }
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(m) {
  const kpi = state.kpis || {};
  m.innerHTML = `
    <div class="row g-2 mb-3">
      ${kpiCard('Total', kpi.total, 'bi-people-fill', '#0d6efd')}
      ${kpiCard('New', kpi.new, 'bi-stars', '#0ea5e9')}
      ${kpiCard('Interviewed', kpi.interviewed, 'bi-mic', '#6366f1')}
      ${kpiCard('Selected', kpi.selected, 'bi-check2-circle', '#16a34a')}
      ${kpiCard('Rejected', kpi.rejected, 'bi-x-circle', '#dc2626')}
      ${kpiCard('On Hold', kpi.onHold, 'bi-pause-circle', '#6b7280')}
    </div>
    <div class="alert alert-screen mb-3 d-flex justify-content-between align-items-center" onclick="openNotScreened()">
      <div>
        <strong>⚠️ Not Screened Candidates</strong>
        <div class="small">${kpi.notScreened} pending review — tap to view</div>
      </div>
      <i class="bi bi-chevron-right"></i>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-light flex-grow-1" onclick="navigate('candidates')"><i class="bi bi-people me-1"></i>Candidates</button>
      <button class="btn btn-light flex-grow-1" onclick="navigate('interviews')"><i class="bi bi-calendar-check me-1"></i>Interviews</button>
      <button class="btn btn-light flex-grow-1" onclick="navigate('analytics')"><i class="bi bi-graph-up me-1"></i>Analytics</button>
    </div>
  `;
}

function kpiCard(label, val, icon, color) {
  return `<div class="col-6 col-md-4">
    <div class="kpi-card p-3 d-flex align-items-center justify-content-between">
      <div><div class="label">${label}</div><div class="value">${val||0}</div></div>
      <i class="bi ${icon} icon" style="color:${color}"></i>
    </div></div>`;
}

function openNotScreened() {
  state.filters.status = 'Not Screened';
  navigate('candidates');
}

// ============================================================
// CANDIDATES (date-sorted CV table; default: New + Not Screened)
// ============================================================
const CHIP_FILTERS = [
  { key: 'PENDING',     label: 'Pending (New + Not Screened)' },
  { key: '',            label: 'All' },
  { key: 'Shortlisted', label: 'Shortlisted' },
  { key: 'Interviewed', label: 'Interviewed' },
  { key: 'Selected',    label: 'Selected' },
  { key: 'Rejected',    label: 'Rejected' },
  { key: 'On Hold',     label: 'On Hold' }
];

function renderCandidates(m) {
  m.innerHTML = `
    <input id="searchInput" class="form-control mb-2" placeholder="Search name, role, phone, email..."
           value="${escapeAttr(state.filters.q||'')}"
           oninput="state.filters.q=this.value; renderCandidateList()">
    <div class="chip-row" id="chipRow">
      ${CHIP_FILTERS.map(f => `
        <button class="chip ${state.filters.status===f.key?'active':''}"
                onclick="state.filters.status='${f.key}'; renderCandidateList()">
          ${escapeHtml(f.label)}
        </button>`).join('')}
    </div>
    <div id="candList"></div>`;
  renderCandidateList();
}

function renderCandidateList() {
  // Refresh active chip state
  const chips = document.querySelectorAll('#chipRow .chip');
  chips.forEach((c, i) => c.classList.toggle('active', CHIP_FILTERS[i].key === state.filters.status));

  const q = (state.filters.q || '').toLowerCase();
  const st = state.filters.status;

  let list = state.candidates.filter(c => {
    if (st === 'PENDING') {
      if (c.Status !== 'New' && c.Status !== 'Not Screened') return false;
    } else if (st && c.Status !== st) return false;
    if (q) {
      const blob = `${c.Name} ${c.RoleApplied} ${c.Phone} ${c.Email}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  // Newest first by CreatedAt
  list.sort((a, b) => new Date(b.CreatedAt || 0) - new Date(a.CreatedAt || 0));

  const el = document.getElementById('candList');
  if (!list.length) {
    el.innerHTML = '<div class="text-center text-muted py-5">No candidates match this filter.</div>';
    return;
  }

  el.innerHTML = `
    <div class="kpi-card p-0 mb-2" style="overflow:hidden">
      <div class="d-flex justify-content-between align-items-center px-3 py-2" style="background:#f8fafc">
        <div class="cv-meta"><strong>${list.length}</strong> CV${list.length===1?'':'s'} · newest first</div>
        <div class="cv-meta"><i class="bi bi-clock-history"></i> Upload order</div>
      </div>
      <div style="overflow-x:auto">
      <table class="cv-table">
        <thead>
          <tr>
            <th>Candidate</th>
            <th>Role</th>
            <th>Status</th>
            <th>CV</th>
            <th>Uploaded</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(c => `
            <tr onclick="openCandidate('${c.CandidateID}')">
              <td>
                <div class="cv-name">${escapeHtml(c.Name)}</div>
                <div class="cv-meta">${escapeHtml(c.Phone||'')}${c.Email?' · '+escapeHtml(c.Email):''}</div>
              </td>
              <td>${escapeHtml(c.RoleApplied||'—')}</td>
              <td><span class="badge-status b-${(c.Status||'').replace(/\s/g,'')}">${c.Status||''}</span></td>
              <td onclick="event.stopPropagation()">
                ${c.ResumeLink
                  ? `<a class="cv-link" href="${encodeURI(c.ResumeLink)}" target="_blank"><i class="bi bi-file-earmark-text"></i> View</a>`
                  : '<span class="cv-meta">—</span>'}
              </td>
              <td class="cv-meta">${formatRelative(c.CreatedAt)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      </div>
    </div>`;
}

function candidateNameById(id) {
  const c = state.candidates.find(x => x.CandidateID === id);
  return c ? c.Name : id;
}

function formatRelative(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d);
  const diff = Date.now() - dt.getTime();
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
  if (diff < 0) return dt.toLocaleDateString();
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  if (h < 24) return h + 'h ago';
  if (days < 7) return days + 'd ago';
  return dt.toLocaleDateString();
}

async function submitCandidate(e) {
  e.preventDefault();
  const form = e.target;
  const fd = Object.fromEntries(new FormData(form).entries());
  delete fd.ResumeFile;

  const fileInput = document.getElementById('newResumeFile');
  const btn = form.querySelector('button[type="submit"]');
  const originalLabel = btn.innerHTML;

  try {
    if (fileInput && fileInput.files && fileInput.files[0]) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Uploading resume...';
      fd.ResumeUpload = await fileToUploadPayload(fileInput.files[0]);
    } else {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
    }
    const res = await api('addCandidate', fd);
    // Insert into cache instantly so the new CV shows up at the top of the list.
    state.candidates.unshift({
      CandidateID: res.CandidateID,
      Name: fd.Name, Phone: fd.Phone || '', Email: fd.Email || '',
      RoleApplied: fd.RoleApplied || '',
      ResumeLink: res.ResumeLink || fd.ResumeLink || '',
      Source: fd.Source || '',
      Status: fd.Status || 'New',
      CreatedAt: new Date().toISOString()
    });
    bootstrap.Modal.getInstance(document.getElementById('candidateModal')).hide();
    toast('Candidate saved.');
    renderView();
    refreshFromServer();
  } catch (err) {
    toast(err.message || 'Failed.', 'danger');
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalLabel;
  }
}

// Read a File as { fileName, mimeType, base64 }. Rejects files over the limit.
function fileToUploadPayload(file) {
  const MAX = 25 * 1024 * 1024;
  if (file.size > MAX) {
    return Promise.reject(new Error('File too large. Limit is 25 MB.'));
  }
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.onload = () => {
      const result = reader.result || '';
      const b64 = String(result).split(',')[1] || '';
      resolve({
        fileName: file.name,
        mimeType: file.type || 'application/octet-stream',
        base64: b64
      });
    };
    reader.readAsDataURL(file);
  });
}

// Mutate the local cache so the UI reflects writes instantly.
function patchCandidateInCache(id, patch) {
  const c = state.candidates.find(x => x.CandidateID === id);
  if (c) Object.assign(c, patch);
}

async function changeStatus(id) {
  const v = document.getElementById('statusSelect').value;
  try {
    await api('updateStatus', id, v);
    patchCandidateInCache(id, { Status: v });
    toast('Status updated.');
    bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
    renderView();
    refreshFromServer(); // pull fresh data in the background
  } catch (e) { toast(e.message || 'Failed.', 'danger'); }
}

async function uploadResume(candidateId) {
  const input = document.getElementById('resumeUploadInput');
  const btn = document.getElementById('resumeUploadBtn');
  if (!input || !input.files || !input.files[0]) {
    toast('Choose a file first.', 'warning');
    return;
  }
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
  try {
    const payload = await fileToUploadPayload(input.files[0]);
    const res = await api('uploadResumeForCandidate', candidateId, payload);
    patchCandidateInCache(candidateId, { ResumeLink: res.ResumeLink });
    toast('Resume uploaded.');
    const area = document.getElementById('resumeLinkArea');
    if (area && res.ResumeLink) {
      area.innerHTML = `<a href="${encodeURI(res.ResumeLink)}" target="_blank">View Resume</a>`;
    }
    input.value = '';
  } catch (e) {
    toast(e.message || 'Upload failed.', 'danger');
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

async function submitFeedback(e) {
  e.preventDefault();
  const fd = Object.fromEntries(new FormData(e.target).entries());
  try {
    await api('updateInterviewFeedback', fd);
    const iv = state.interviews.find(x => x.InterviewID === fd.InterviewID);
    if (iv) {
      if (fd.Feedback !== undefined) iv.Feedback = fd.Feedback;
      if (fd.Score !== undefined) iv.Score = fd.Score;
      if (fd.Status !== undefined) iv.Status = fd.Status;
    }
    bootstrap.Modal.getInstance(document.getElementById('feedbackModal')).hide();
    toast('Feedback saved.');
    renderView();
    refreshFromServer();
  } catch (err) { toast(err.message || 'Failed.', 'danger'); }
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }
function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d);
  return dt.toLocaleString();
}

// ============================================================
// SERVICE WORKER REGISTRATION (PWA)
// ============================================================
function registerSw() {
  if (!('serviceWorker' in navigator)) return;
  // Service workers must be on same origin and at scope root - Apps Script serves
  // the app from script.google.com / userContent.google.com which limits SW reliability,
  // but we register for browsers that allow it.
  try {
    navigator.serviceWorker.register('?page=sw').catch(()=>{});
  } catch (e) {}
}
