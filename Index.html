<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SM Recruitment</title>
<style>
  :root{
    --bg:#0b1020; --surface:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e8ecf3;
    --brand:#6366f1; --brand2:#8b5cf6; --brand3:#22d3ee; --ok:#10b981; --warn:#f59e0b; --bad:#ef4444;
    --shadow:0 10px 30px rgba(15,23,42,.08); --shadow-lg:0 24px 60px rgba(15,23,42,.16);
    --radius:18px; --radius-sm:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{
    color:var(--ink); padding-bottom:92px; font-size:15px; line-height:1.45;
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1100px 520px at 8% -8%, rgba(99,102,241,.18), transparent 60%),
      radial-gradient(900px 480px at 108% 4%, rgba(34,211,238,.16), transparent 55%),
      linear-gradient(180deg,#f6f8fe 0%, #eef1fb 100%);
    background-attachment:fixed;
  }
  .hidden{display:none !important}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

  /* Boot / status screens */
  .center{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px}
  .logo{width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:16px;
    box-shadow:0 16px 40px rgba(99,102,241,.45)}
  .spinner{width:42px;height:42px;border-radius:50%;border:3px solid rgba(99,102,241,.25);border-top-color:var(--brand);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .muted{color:var(--muted)} .small{font-size:.84rem} .tiny{font-size:.7rem}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;border:0;border-radius:12px;
    padding:11px 18px;font-size:.92rem;font-weight:600;font-family:inherit;color:#fff;
    background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 8px 22px rgba(99,102,241,.35);
    transition:transform .12s ease, box-shadow .12s ease, filter .12s}
  .btn:hover{filter:brightness(1.05);box-shadow:0 12px 28px rgba(99,102,241,.42)}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn:disabled{opacity:.6;cursor:default;box-shadow:none}
  .btn-light{background:#fff;color:var(--ink);box-shadow:var(--shadow);border:1px solid var(--line)}
  .btn-ghost{background:rgba(99,102,241,.10);color:var(--brand);box-shadow:none}
  .btn-danger{background:linear-gradient(135deg,#f43f5e,#ef4444);box-shadow:0 8px 22px rgba(239,68,68,.32)}
  .btn-sm{padding:7px 12px;font-size:.8rem;border-radius:10px}
  .btn-block{width:100%}

  /* Header */
  .header{position:sticky;top:0;z-index:30;padding:18px 18px 16px;color:#fff;
    background:linear-gradient(135deg,#4f46e5 0%, #7c3aed 55%, #8b5cf6 100%);
    border-radius:0 0 26px 26px;box-shadow:0 14px 34px rgba(79,70,229,.32);
    display:flex;justify-content:space-between;align-items:center;overflow:hidden}
  .header::after{content:"";position:absolute;right:-40px;top:-60px;width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%)}
  .header h1{font-size:1.25rem;margin:0;font-weight:800;letter-spacing:-.02em}
  .header .sub{opacity:.9;font-size:.74rem;margin-top:2px}
  .icon-btn{position:relative;z-index:1;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.25);
    color:#fff;width:40px;height:40px;border-radius:12px;font-size:1.15rem;cursor:pointer;transition:background .15s}
  .icon-btn:active{background:rgba(255,255,255,.32)}

  main{padding:16px;max-width:780px;margin:0 auto;animation:rise .35s ease}

  /* Cards & grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media (max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border:1px solid rgba(255,255,255,.6)}
  .kpi{position:relative;overflow:hidden}
  .kpi .label{font-size:.66rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
  .kpi .value{font-size:1.75rem;font-weight:800;margin-top:3px;letter-spacing:-.02em}
  .kpi .ic{position:absolute;right:12px;top:12px;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;font-size:17px;background:linear-gradient(135deg,rgba(99,102,241,.14),rgba(139,92,246,.14))}
  .section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin:18px 4px 8px}

  .alert{border-radius:var(--radius);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .12s}
  .alert:active{transform:scale(.99)}
  .alert-warn{background:linear-gradient(135deg,#fff7ed,#ffedd5);color:#9a3412;border:1px solid #fed7aa}
  .alert-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;text-align:left;cursor:default}

  /* Inputs */
  label{display:block;font-size:.78rem;font-weight:600;margin-bottom:5px;color:#334155}
  input,select,textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:.92rem;
    font-family:inherit;background:#fbfcfe;color:var(--ink);transition:border-color .15s, box-shadow .15s}
  input:focus,select:focus,textarea:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 4px rgba(99,102,241,.14);background:#fff}
  .field{margin-bottom:12px} .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* Dropzone */
  .drop{border:2px dashed #c7cdf4;border-radius:14px;padding:18px;text-align:center;cursor:pointer;background:rgba(99,102,241,.05);
    transition:border-color .15s, background .15s}
  .drop:hover{border-color:var(--brand);background:rgba(99,102,241,.09)}
  .drop .di{font-size:26px}
  .scanbox{margin-top:10px;border-radius:12px;padding:10px 12px;font-size:.82rem;display:flex;align-items:center;gap:9px}
  .scanbox.work{background:#eef2ff;color:#3730a3}
  .scanbox.done{background:#ecfdf5;color:#065f46}
  .scanbox.fail{background:#fff7ed;color:#9a3412}
  .mini-spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(99,102,241,.3);border-top-color:var(--brand);animation:spin .8s linear infinite;flex:none}

  /* Chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:6px}
  .chips::-webkit-scrollbar{display:none}
  .chip{border:1.5px solid var(--line);background:#fff;color:#475569;padding:7px 14px;border-radius:999px;font-size:.8rem;
    white-space:nowrap;cursor:pointer;font-weight:600;transition:all .12s}
  .chip.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(99,102,241,.32)}

  /* Candidate list */
  .crow{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:#fff;box-shadow:var(--shadow);
    margin-bottom:10px;cursor:pointer;transition:transform .12s, box-shadow .12s}
  .crow:active{transform:scale(.995)} .crow:hover{box-shadow:var(--shadow-lg)}
  .avatar{width:42px;height:42px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;
    font-weight:700;font-size:.95rem;background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .crow .nm{font-weight:700} .crow .meta{color:var(--muted);font-size:.76rem}

  .badge{font-size:.66rem;padding:4px 9px;border-radius:999px;white-space:nowrap;font-weight:700}
  .b-New{background:#e0f2fe;color:#075985} .b-NotScreened{background:#fef3c7;color:#92400e}
  .b-Shortlisted{background:#e0e7ff;color:#3730a3} .b-Interviewed{background:#f1f5f9;color:#334155}
  .b-Selected{background:#d1fae5;color:#065f46} .b-Rejected{background:#fee2e2;color:#991b1b} .b-OnHold{background:#f3f4f6;color:#374151}

  /* Funnel / bars */
  .funnel{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .funnel .fl{width:88px;font-size:.78rem;color:var(--muted);font-weight:600}
  .funnel .fb{height:28px;border-radius:8px;display:flex;align-items:center;padding:0 11px;font-size:.78rem;font-weight:700;color:#fff;min-width:30px;
    background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .bar-track{background:#eef2ff;border-radius:8px;height:9px;overflow:hidden;margin-top:6px}
  .bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--brand),var(--brand3))}

  /* Bottom nav */
  nav.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:min(94vw,520px);z-index:40;
    background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.7);
    border-radius:20px;box-shadow:var(--shadow-lg);display:flex;padding:7px}
  nav.tabs button{flex:1;background:none;border:0;padding:8px 0;color:var(--muted);font-size:.64rem;font-weight:600;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:14px;transition:color .15s, background .15s}
  nav.tabs button .ic{height:22px;display:flex;align-items:center}
  nav.tabs button .ic svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:block}
  nav.tabs button.active{color:var(--brand);background:rgba(99,102,241,.12)}
  .kpi.clickable{cursor:pointer;transition:transform .12s, box-shadow .12s}
  .kpi.clickable:hover{box-shadow:var(--shadow-lg)} .kpi.clickable:active{transform:scale(.98)}
  .err-text{color:var(--bad);font-size:.74rem;margin-top:4px}
  input.invalid,select.invalid{border-color:var(--bad);box-shadow:0 0 0 4px rgba(239,68,68,.12)}

  .fab{position:fixed;right:max(18px,calc(50vw - 252px));bottom:88px;width:58px;height:58px;border-radius:50%;
    background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:0;font-size:1.8rem;cursor:pointer;z-index:35;
    box-shadow:0 14px 30px rgba(99,102,241,.5);transition:transform .12s}
  .fab:active{transform:scale(.94)}

  /* Modal */
  .backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);z-index:50;display:none;animation:rise .2s}
  .backdrop.show{display:block}
  .modal{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);z-index:51;background:#fff;
    border-radius:24px 24px 0 0;width:min(100vw,560px);max-height:92vh;overflow:auto;box-shadow:var(--shadow-lg);
    transition:transform .28s cubic-bezier(.22,1,.36,1)}
  @media (min-width:560px){.modal{bottom:auto;top:50%;border-radius:24px;transform:translate(-50%,-46%) scale(.96);opacity:0;
    transition:transform .24s, opacity .24s}}
  .modal.show{transform:translateX(-50%) translateY(0)}
  @media (min-width:560px){.modal.show{transform:translate(-50%,-50%) scale(1);opacity:1}}
  .modal .grab{width:42px;height:5px;border-radius:5px;background:#e2e8f0;margin:10px auto 0}
  @media (min-width:560px){.modal .grab{display:none}}
  .modal .mh{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 6px}
  .modal .mh h3{margin:0;font-size:1.08rem;font-weight:800;letter-spacing:-.01em}
  .modal .mb{padding:8px 18px 22px}
  .x{background:#f1f5f9;border:0;width:32px;height:32px;border-radius:10px;font-size:1.2rem;cursor:pointer;color:var(--muted);line-height:1}

  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;padding:11px 18px;border-radius:12px;color:#fff;
    font-size:.86rem;font-weight:600;box-shadow:var(--shadow-lg);animation:rise .2s}
  .toast.ok{background:linear-gradient(135deg,#10b981,#059669)} .toast.err{background:linear-gradient(135deg,#f43f5e,#ef4444)}

  a.link{color:var(--brand);text-decoration:none;font-weight:600}
  .stack>*+*{margin-top:10px}
  .between{display:flex;justify-content:space-between;align-items:center}
  .pill{display:inline-flex;gap:6px;align-items:center;padding:5px 11px;border-radius:999px;background:rgba(99,102,241,.1);color:var(--brand);font-size:.74rem;font-weight:700}
</style>
</head>
<body>

<!-- BOOT SCREEN (auto-loads; no button) -->
<div id="boot" class="center">
  <div class="logo">🏨</div>
  <h2 style="margin:0 0 6px;font-weight:800;letter-spacing:-.02em">SM Recruitment</h2>
  <div class="spinner" style="margin-top:14px"></div>
  <p class="muted small" id="bootMsg" style="margin-top:14px">Loading your dashboard…</p>
  <pre id="diag" class="hidden" style="text-align:left;white-space:pre-wrap;word-break:break-word;max-width:min(92vw,640px);
    margin-top:14px;padding:10px;border-radius:10px;background:#0b1221;color:#cbd5e1;
    font:.68rem/1.45 ui-monospace,Menlo,Consolas,monospace;border:1px solid #1e293b"></pre>
</div>

<!-- ACCESS DENIED -->
<div id="gate" class="center hidden">
  <div class="logo" style="background:linear-gradient(135deg,#fb7185,#ef4444);box-shadow:0 16px 40px rgba(239,68,68,.4)">⛔</div>
  <h2 style="margin:0 0 6px;font-weight:800">Access Denied</h2>
  <p class="muted small" id="gateMsg"></p>
  <button class="btn" onclick="boot()" style="margin-top:10px">Retry</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="header">
    <div>
      <h1 id="screenTitle">Dashboard</h1>
      <div class="sub" id="userInfo"></div>
    </div>
    <button class="icon-btn" onclick="refresh()" title="Refresh">⟳</button>
  </header>
  <main id="view"></main>
  <button id="fab" class="fab hidden" onclick="openAddCandidate()">+</button>
  <nav class="tabs">
    <button data-view="dashboard" onclick="go('dashboard')"><span class="ic" data-ic="home"></span>Home</button>
    <button data-view="candidates" onclick="go('candidates')"><span class="ic" data-ic="people"></span>Candidates</button>
    <button data-view="interviews" onclick="go('interviews')"><span class="ic" data-ic="calendar"></span>Interviews</button>
    <button data-view="analytics" onclick="go('analytics')"><span class="ic" data-ic="chart"></span>Analytics</button>
    <button data-view="profile" onclick="go('profile')"><span class="ic" data-ic="user"></span>Profile</button>
  </nav>
</div>

<!-- MODAL -->
<div id="backdrop" class="backdrop" onclick="closeModal()"></div>
<div id="modal" class="modal">
  <div class="grab"></div>
  <div class="mh"><h3 id="modalTitle">Title</h3><button class="x" onclick="closeModal()">&times;</button></div>
  <div class="mb" id="modalBody"></div>
</div>

<script>
// ============================================================
// DIAGNOSTICS
// ============================================================
console.info('SM Recruitment — build 2026.06.25-modern');
(function () {
  var lines = [];
  function show(){ var d=document.getElementById('diag'); if(d){d.classList.remove('hidden'); d.textContent=lines.join('\n');} }
  window.__diag=function(s){ lines.push(s); try{console.error('[DIAG] '+s);}catch(e){} show(); };
  window.onerror=function(msg,src,line,col){
    if(/createOAuthDialog/i.test(String(src||''))){
      var m=document.getElementById('bootMsg');
      if(m) m.textContent='Authorization issue. Deploy the web app with "Execute as: Me" (see README).';
    }
    window.__diag('ERROR: '+msg); window.__diag('  at '+(src||'?')+':'+line+':'+col); return false;
  };
})();

// ============================================================
// STATE
// ============================================================
var state={ user:null, view:'dashboard', candidates:[], interviews:[], messages:[], kpis:{}, metrics:{}, roleStats:[],
  waTemplate:'', filter:{status:'PENDING',q:''}, loaded:false, busy:false };
var CHIPS=[{k:'PENDING',l:'Pending'},{k:'',l:'All'},{k:'New',l:'New'},{k:'Not Screened',l:'Not Screened'},
  {k:'Shortlisted',l:'Shortlisted'},{k:'Interviewed',l:'Interviewed'},
  {k:'Selected',l:'Selected'},{k:'Rejected',l:'Rejected'},{k:'On Hold',l:'On Hold'}];

// ============================================================
// API
// ============================================================
function api(fn){
  var args=Array.prototype.slice.call(arguments,1);
  return new Promise(function(resolve,reject){
    if(typeof google==='undefined'||!google.script||!google.script.run){ reject(new Error('Not running inside the Apps Script web app.')); return; }
    var r=google.script.run.withSuccessHandler(resolve)
      .withFailureHandler(function(e){ reject(e instanceof Error?e:new Error(e&&e.message?e.message:String(e))); });
    r[fn].apply(r,args);
  });
}
function withTimeout(p,ms,label){
  return new Promise(function(resolve,reject){
    var t=setTimeout(function(){reject(new Error(label+' timed out after '+(ms/1000)+'s.'));},ms);
    p.then(function(v){clearTimeout(t);resolve(v);},function(e){clearTimeout(t);reject(e);});
  });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function initials(n){ var p=String(n||'?').trim().split(/\s+/); return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function toast(msg,kind){ var t=document.createElement('div'); t.className='toast '+(kind==='err'?'err':'ok'); t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){t.remove();},2800); }
function formData(form){ var o={},fd=new FormData(form); fd.forEach(function(v,k){o[k]=v;}); return o; }

// ============================================================
// MODAL
// ============================================================
function openModal(title,html){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('backdrop').classList.add('show');
  requestAnimationFrame(function(){ document.getElementById('modal').classList.add('show'); });
}
function closeModal(){
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('modal').classList.remove('show');
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });
</script>

<script>
// ============================================================
// BOOT  (auto-runs on load — straight to dashboard)
// ============================================================
function showScreen(id){ ['boot','gate','app'].forEach(function(x){ var el=document.getElementById(x); if(el) el.classList.toggle('hidden',x!==id); }); }
function showGate(msg){ document.getElementById('gateMsg').textContent=msg||'Something went wrong.'; showScreen('gate'); }

function boot(){
  showScreen('boot');
  if(typeof google==='undefined'||!google.script||!google.script.run){ showGate('Open this page via the Apps Script Web App URL (…/exec).'); return; }
  withTimeout(api('bootstrapApp'),45000,'bootstrapApp').then(function(d){
    if(!d||!d.user){ showGate('Empty response from server. Re-check Code.gs / redeploy.'); return; }
    if(!d.user.authorized){ showGate(d.user.message||'Access denied.'); return; }
    apply(d);
    document.getElementById('userInfo').textContent=state.user.name+' · '+state.user.role;
    showScreen('app');
    document.getElementById('fab').classList.toggle('hidden',!state.user.permissions.addCandidate);
    go('dashboard');
  }).catch(function(e){ showGate((e&&e.message)||'Failed to load.'); });
}
function apply(d){
  state.user=d.user; state.candidates=d.candidates||[]; state.interviews=d.interviews||[]; state.messages=d.messages||[];
  if(d.waTemplate!=null) state.waTemplate=d.waTemplate;
  state.kpis=d.kpis||{}; state.metrics=d.metrics||{}; state.roleStats=d.roleStats||[]; state.loaded=true;
}
function refresh(){
  if(state.busy) return; state.busy=true;
  var btn=document.querySelector('.header .icon-btn'); if(btn) btn.style.opacity='.5';
  api('bootstrapApp').then(function(d){ if(d.user&&d.user.authorized){ apply(d); render(); } })
    .catch(function(e){ toast(e.message||'Refresh failed.','err'); })
    .then(function(){ state.busy=false; if(btn) btn.style.opacity=''; });
}

// ROUTER
function go(view){
  state.view=view;
  var tabs=document.querySelectorAll('nav.tabs button');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active',tabs[i].getAttribute('data-view')===view);
  document.getElementById('fab').classList.toggle('hidden',view!=='candidates'||!state.user.permissions.addCandidate);
  var titles={dashboard:'Dashboard',candidates:'Candidates',interviews:'Interviews',analytics:'Analytics',profile:'Profile'};
  document.getElementById('screenTitle').textContent=titles[view]||'';
  render();
}
function render(){
  var m=document.getElementById('view');
  try{
    if(state.view==='dashboard') return renderDashboard(m);
    if(state.view==='candidates') return renderCandidates(m);
    if(state.view==='interviews') return renderInterviews(m);
    if(state.view==='analytics') return renderAnalytics(m);
    if(state.view==='profile') return renderProfile(m);
  }catch(e){ m.innerHTML='<div class="alert alert-err">'+esc(e.message||'Render error')+'</div>'; }
}

// DASHBOARD
// status: optional filter key — when set, the card is clickable and opens the
// candidates list filtered to that status.
function kpi(label,val,icon,status){
  var attrs = (status!==undefined)
    ? ' class="card kpi clickable" onclick="gotoStatus(\''+status+'\')"'
    : ' class="card kpi"';
  return '<div'+attrs+'><div class="ic">'+icon+'</div><div class="label">'+label+'</div><div class="value">'+(val||0)+'</div></div>';
}
// Open the Candidates tab filtered to a given status.
function gotoStatus(status){ state.filter.status=status; state.filter.q=''; go('candidates'); }
function renderDashboard(m){
  var k=state.kpis;
  m.innerHTML=
    '<div class="grid">'+
      kpi('Total',k.total,'👥','')+kpi('New',k.new,'✨','New')+kpi('Interviewed',k.interviewed,'🎙','Interviewed')+
      kpi('Selected',k.selected,'✅','Selected')+kpi('Rejected',k.rejected,'⛔','Rejected')+kpi('On Hold',k.onHold,'⏸','On Hold')+
    '</div>'+
    '<div class="alert alert-warn" style="margin-top:14px" onclick="gotoStatus(\'Not Screened\')">'+
      '<div><strong>Not Screened</strong><div class="small">'+(k.notScreened||0)+' pending review — tap to view</div></div><span style="font-size:1.3rem">›</span></div>'+
    '<div class="section-title">Quick actions</div>'+
    '<div class="stack">'+
      (state.user.permissions.addCandidate?'<button class="btn btn-block" onclick="openAddCandidate()">＋ Add Candidate</button>':'')+
      '<button class="btn btn-light btn-block" onclick="go(\'analytics\')">View Analytics</button>'+
    '</div>';
}

// CANDIDATES
function renderCandidates(m){
  var chips=CHIPS.map(function(c){ return '<button class="chip'+(state.filter.status===c.k?' active':'')+
    '" onclick="state.filter.status=\''+c.k+'\';renderCandidates(document.getElementById(\'view\'))">'+esc(c.l)+'</button>'; }).join('');
  m.innerHTML='<input id="q" placeholder="🔍  Search name, role, phone, email…" value="'+esc(state.filter.q)+
    '" oninput="state.filter.q=this.value;renderList()" style="margin-bottom:12px">'+
    '<div class="chips">'+chips+'</div><div id="list"></div>';
  renderList();
}
function renderList(){
  var q=(state.filter.q||'').toLowerCase(), st=state.filter.status;
  var list=state.candidates.filter(function(c){
    if(st==='PENDING'){ if(c.Status!=='New'&&c.Status!=='Not Screened') return false; }
    else if(st&&c.Status!==st) return false;
    if(q&&((c.Name||'')+' '+(c.RoleApplied||'')+' '+(c.Phone||'')+' '+(c.Email||'')).toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
  list.sort(function(a,b){ return new Date(b.CreatedAt||0)-new Date(a.CreatedAt||0); });
  var el=document.getElementById('list');
  if(!list.length){ el.innerHTML='<div class="card muted small" style="text-align:center">No candidates match.</div>'; return; }
  el.innerHTML='<div class="muted tiny" style="margin:0 4px 8px">'+list.length+' candidate'+(list.length===1?'':'s')+' · newest first</div>'+
    list.map(function(c){
      return '<div class="crow" onclick="openCandidate(\''+c.CandidateID+'\')">'+
        '<div class="avatar">'+initials(c.Name)+'</div>'+
        '<div style="flex:1;min-width:0"><div class="nm">'+esc(c.Name)+'</div>'+
          '<div class="meta">'+esc(c.RoleApplied||'—')+(c.Phone?' · '+esc(c.Phone):'')+'</div></div>'+
        '<div style="text-align:right"><span class="badge b-'+badge(c.Status)+'">'+esc(c.Status||'')+'</span>'+
          '<div class="muted tiny" style="margin-top:5px">'+rel(c.CreatedAt)+'</div></div></div>';
    }).join('');
}
function badge(s){ return String(s||'').replace(/\s/g,''); }
function nameOf(id){ for(var i=0;i<state.candidates.length;i++) if(state.candidates[i].CandidateID===id) return state.candidates[i].Name; return id; }
function rel(d){
  if(!d) return '—'; var dt=new Date(d); if(isNaN(dt)) return String(d);
  var diff=Date.now()-dt.getTime(); if(diff<0) return dt.toLocaleDateString();
  var mi=Math.floor(diff/6e4),h=Math.floor(diff/36e5),da=Math.floor(diff/864e5);
  if(mi<1) return 'just now'; if(mi<60) return mi+'m'; if(h<24) return h+'h'; if(da<7) return da+'d'; return dt.toLocaleDateString();
}
function fdate(d){ if(!d) return '—'; var dt=new Date(d); return isNaN(dt)?String(d):dt.toLocaleString(); }
</script>

<script>
// ============================================================
// ADD CANDIDATE + RESUME UPLOAD/AUTOFILL
// ============================================================
function openAddCandidate(){
  openModal('Add Candidate',
    '<form id="candForm" onsubmit="submitCandidate(event)" class="stack">'+
      '<div class="drop" id="drop" onclick="document.getElementById(\'resumeFile\').click()">'+
        '<div class="di">📄</div><div style="font-weight:700;margin-top:4px">Upload Resume to auto-fill</div>'+
        '<div class="muted tiny" style="margin-top:2px">PDF, DOC/DOCX, or image · saved to Drive · max 20&nbsp;MB</div>'+
        '<input type="file" id="resumeFile" class="hidden" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp,application/pdf,image/*" onchange="onResumePicked(this)">'+
      '</div>'+
      '<div id="scanStatus"></div>'+
      '<input type="hidden" name="ResumeLink" id="resumeLink">'+
      '<div class="field"><label>Name *</label><input name="Name" id="f_name" required></div>'+
      '<div class="row2"><div class="field"><label>Phone</label><input name="Phone" id="f_phone"></div>'+
      '<div class="field"><label>Email</label><input name="Email" id="f_email" type="email"></div></div>'+
      '<div class="field"><label>Role Applied</label><input name="RoleApplied" id="f_role" placeholder="Front Desk, Chef…"></div>'+
      '<div class="field"><label>Source</label><input name="Source" placeholder="Referral, Naukri…"></div>'+
      '<div class="field"><label>Status</label><select name="Status"><option>New</option><option>Not Screened</option><option>Shortlisted</option></select></div>'+
      '<button class="btn btn-block" type="submit">Save Candidate</button>'+
    '</form>');
}

// Read file -> base64, call scanResume, fill fields.
function onResumePicked(input){
  var file=input.files&&input.files[0]; if(!file) return;
  if(file.size>20*1024*1024){ setScan('fail','File too large (max 20 MB).'); return; }
  setScan('work','Uploading & reading “'+file.name+'”…');
  var reader=new FileReader();
  reader.onerror=function(){ setScan('fail','Could not read the file.'); };
  reader.onload=function(){
    var b64=String(reader.result||'').split(',')[1]||'';
    api('scanResume',{ fileName:file.name, mimeType:file.type||'application/octet-stream', base64:b64 })
      .then(function(res){
        if(res.url) document.getElementById('resumeLink').value=res.url;
        var s=res.suggested||{}, filled=[];
        if(s.name){ document.getElementById('f_name').value=s.name; filled.push('name'); }
        if(s.phone){ document.getElementById('f_phone').value=s.phone; filled.push('phone'); }
        if(s.email){ document.getElementById('f_email').value=s.email; filled.push('email'); }
        if(s.role){ var rl=document.getElementById('f_role'); if(rl&&!rl.value){ rl.value=s.role; filled.push('role'); } }
        var extra='';
        if(!res.textOk){ extra=' Note: this PDF’s text layer is unreadable — please fill the details in.'; }
        var where=res.duplicate?'Already in Drive — reusing the existing file':'Saved to Drive';
        if(filled.length){ setScan('done',where+' · auto-filled '+filled.join(', ')+'. Please verify.',res); }
        else { setScan('fail',where+'. Couldn’t auto-detect details — please fill them in.'+extra,res); }
      })
      .catch(function(err){ setScan('fail','Upload failed: '+(err.message||'error')); });
  };
  reader.readAsDataURL(file);
}
function setScan(kind,msg,res){
  var el=document.getElementById('scanStatus'); if(!el) return;
  var icon=kind==='work'?'<span class="mini-spin"></span>':(kind==='done'?'✅':'⚠️');
  var dbg='';
  if(res&&typeof res.debugText==='string'){
    var t=res.debugText?esc(res.debugText):'(empty — the PDF produced no readable text)';
    dbg='<div style="margin-top:6px"><a href="#" onclick="this.nextSibling.classList.toggle(\'hidden\');return false" style="font-size:.72rem">▸ what the scanner read ('+(res.extractedChars||0)+' chars)</a>'+
      '<div class="hidden" style="margin-top:4px;max-height:120px;overflow:auto;background:#0b1221;color:#cbd5e1;padding:8px;border-radius:8px;font:.66rem ui-monospace,monospace;white-space:pre-wrap">'+t+'</div></div>';
  }
  el.innerHTML='<div class="scanbox '+kind+'">'+icon+'<span>'+esc(msg)+'</span></div>'+dbg;
}
function validEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(s||'').trim()); }
function validPhone(s){ var d=String(s||'').replace(/[^\d]/g,''); return d.length>=7&&d.length<=15; }
function fieldErr(id,bad,msg){
  var el=document.getElementById(id); if(!el) return;
  el.classList.toggle('invalid',!!bad);
  var next=el.parentNode.querySelector('.err-text');
  if(bad){ if(!next){ next=document.createElement('div'); next.className='err-text'; el.parentNode.appendChild(next);} next.textContent=msg; }
  else if(next){ next.remove(); }
}
function submitCandidate(e){
  e.preventDefault(); var d=formData(e.target);
  // Client-side validation before the round-trip.
  var ok=true;
  if(d.Email&&!validEmail(d.Email)){ fieldErr('f_email',true,'Enter a valid email.'); ok=false; } else fieldErr('f_email',false);
  if(d.Phone&&!validPhone(d.Phone)){ fieldErr('f_phone',true,'Enter a valid phone (7–15 digits).'); ok=false; } else fieldErr('f_phone',false);
  if(!d.Phone&&!d.Email){ fieldErr('f_email',true,'Provide a phone or an email.'); ok=false; }
  if(!ok){ toast('Please fix the highlighted fields.','err'); return; }
  var btn=e.target.querySelector('button[type=submit]'); btn.disabled=true; btn.textContent='Saving…';
  api('addCandidate',d).then(function(res){
    state.candidates.unshift({ CandidateID:res.CandidateID, Name:d.Name, Phone:d.Phone||'', Email:d.Email||'',
      RoleApplied:d.RoleApplied||'', ResumeLink:res.ResumeLink||'', Source:d.Source||'', Status:d.Status||'New', CreatedAt:new Date().toISOString() });
    closeModal(); toast('Candidate saved.'); render(); refresh();
  }).catch(function(err){ btn.disabled=false; btn.textContent='Save Candidate'; toast(err.message||'Failed.','err'); });
}

function openCandidate(id){
  var c=null; for(var i=0;i<state.candidates.length;i++) if(state.candidates[i].CandidateID===id) c=state.candidates[i];
  if(!c){ toast('Not found. Refresh.','err'); return; }
  var p=state.user.permissions;
  var ivs=state.interviews.filter(function(x){return x.CandidateID===id;});
  var opts=['New','Not Screened','Shortlisted','Interviewed','Selected','Rejected','On Hold']
    .map(function(s){return '<option'+(c.Status===s?' selected':'')+'>'+s+'</option>';}).join('');
  var html='<div class="stack">'+
    '<div class="between"><div style="display:flex;gap:12px;align-items:center">'+
      '<div class="avatar" style="width:48px;height:48px;border-radius:15px;font-size:1.05rem">'+initials(c.Name)+'</div>'+
      '<div><strong style="font-size:1.1rem">'+esc(c.Name)+'</strong><div class="muted small">'+esc(c.RoleApplied||'')+'</div></div></div>'+
      '<span class="badge b-'+badge(c.Status)+'">'+esc(c.Status)+'</span></div>'+
    '<div class="card" style="box-shadow:none;border:1px solid var(--line);background:#fbfcfe">'+
      '<div class="small">📞 '+esc(c.Phone||'—')+'</div><div class="small" style="margin-top:5px">✉️ '+esc(c.Email||'—')+'</div>'+
      '<div class="small" style="margin-top:5px">🔗 '+(c.ResumeLink?'<a class="link" href="'+esc(c.ResumeLink)+'" target="_blank">View Resume</a>':'No resume')+'</div>'+
      (String(c.Phone||'').trim()?
        '<div class="row2" style="margin-top:10px">'+
          '<div class="field"><label>WhatsApp number</label>'+
            '<input id="waNum" value="'+esc(waDigits(c.Phone))+'" inputmode="tel"></div>'+
          '<div class="field" style="align-self:end"><div class="muted tiny">Digits incl. country code, no +</div></div></div>'+
        '<div class="field"><label>WhatsApp message (editable)</label>'+
          '<textarea id="waMsg" rows="10">'+esc(defaultWaMsg(c))+'</textarea></div>'+
        '<button class="btn btn-block" style="background:#25D366;border-color:#25D366;color:#fff" '+
          'onclick="openWhatsApp(\''+id+'\')">💬 Message on WhatsApp</button>':'')+'</div>';
  if(p.editCandidate) html+='<button class="btn btn-ghost btn-block" onclick="openEditCandidate(\''+id+'\')">✏️ Edit Details</button>';
  if(p.changeStatus) html+='<div class="field"><label>Update Status</label><div style="display:flex;gap:8px">'+
    '<select id="newStatus">'+opts+'</select><button class="btn btn-sm" onclick="changeStatus(\''+id+'\')">Save</button></div></div>';
  if(p.scheduleInterview) html+='<button class="btn btn-ghost btn-block" onclick="openInterview(\''+id+'\')">＋ Schedule Interview</button>';
  html+='<div class="section-title" style="margin-left:0">Interview History</div>'+
    (ivs.length?ivs.map(function(iv){
      return '<div class="card" style="padding:12px;box-shadow:none;border:1px solid var(--line)"><div class="between"><strong>'+esc(iv.Round)+
        '</strong><span class="muted tiny">'+fdate(iv.DateTime)+'</span></div>'+
        '<div class="small">'+esc(iv.Interviewer||'—')+' · '+esc(iv.Status||'—')+' · Score '+esc(iv.Score||'—')+'</div>'+
        (iv.Feedback?'<div class="small" style="margin-top:4px">'+esc(iv.Feedback)+'</div>':'')+
        (p.addFeedback?'<button class="btn btn-light btn-sm" style="margin-top:8px" onclick="openFeedback(\''+iv.InterviewID+'\')">Add/Edit Feedback</button>':'')+'</div>';
    }).join(''):'<div class="muted small">No interviews yet.</div>');
  // ---- WhatsApp conversation log ----
  var msgs=state.messages.filter(function(x){return x.CandidateID===id;})
    .sort(function(a,b){return new Date(b.Timestamp)-new Date(a.Timestamp);});
  html+='<div class="section-title" style="margin-left:0">WhatsApp Log</div>'+
    (msgs.length?msgs.map(function(msg){
      return '<div class="card" style="padding:12px;box-shadow:none;border:1px solid var(--line)"><div class="between">'+
        '<strong>'+esc(msg.Direction||'Note')+'</strong><span class="muted tiny">'+fdate(msg.Timestamp)+'</span></div>'+
        '<div class="small" style="margin-top:4px;white-space:pre-wrap">'+esc(msg.Body||'')+'</div>'+
        '<div class="muted tiny" style="margin-top:4px">'+esc(msg.By||'')+'</div></div>';
    }).join(''):'<div class="muted small">No messages logged yet.</div>');
  if(p.addFeedback) html+='<form onsubmit="submitMessage(event,\''+id+'\')" class="stack" style="margin-top:10px">'+
    '<div class="field"><label>Log what was discussed</label>'+
      '<textarea id="msgBody" rows="2" placeholder="e.g. Discussed joining date & expected salary…"></textarea></div>'+
    '<div class="row2"><div class="field"><label>Type</label>'+
      '<select id="msgDir"><option value="Note">Note</option><option value="Sent">Sent</option><option value="Received">Received</option></select></div>'+
      '<div class="field" style="align-self:end"><button class="btn btn-block" type="submit">Save to log</button></div></div></form>';
  html+='</div>';
  openModal('Candidate',html);
}
// Normalise a phone to wa.me digits (country code + number, no +/spaces).
// Bare 10-digit Indian mobiles get a 91 prefix; numbers with a leading 0 lose it.
function waDigits(phone){
  var d=String(phone||'').replace(/[^\d]/g,'');
  if(!d) return '';
  if(d.length===10&&/^[6-9]/.test(d)) d='91'+d;
  else if(d.length===11&&d.charAt(0)==='0') d='91'+d.slice(1);
  return d;
}
// WhatsApp message shown (editable) in the candidate profile. The template is
// managed in the Profile tab and stored server-side; placeholders {name},
// {role} and {me} (the logged-in user's name) are filled in here.
function defaultWaMsg(c){
  var t=state.waTemplate||'Hello {name},';
  var me=(state.user&&state.user.name)||'';
  return t.replace(/\{name\}/g,c.Name||'')
          .replace(/\{role\}/g,c.RoleApplied||'')
          .replace(/\{me\}/g,me);
}
function openWhatsApp(id){
  var c=null; for(var i=0;i<state.candidates.length;i++) if(state.candidates[i].CandidateID===id) c=state.candidates[i];
  if(!c) return;
  // Prefer the (editable) number field so a wrong/extra digit can be corrected.
  var numBox=document.getElementById('waNum');
  var d=(numBox&&numBox.value.trim())?numBox.value.replace(/[^\d]/g,''):waDigits(c.Phone);
  if(!d){ toast('No valid phone number.','err'); return; }
  if(d.length<8||d.length>15){ toast('Number looks off ('+d.length+' digits). Include country code, no +, and check for extra digits.','err'); return; }
  // Use whatever the user typed in the editable box; fall back to the default.
  var box=document.getElementById('waMsg');
  var text=(box&&box.value.trim())?box.value:defaultWaMsg(c);
  // Open the chat directly with the message prefilled in WhatsApp's compose box
  // (fully editable there before sending). On desktop go straight to WhatsApp
  // Web; on mobile use wa.me, which hands off to the installed app.
  var isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  var url=isMobile
    ? 'https://wa.me/'+d+'?text='+encodeURIComponent(text)
    : 'https://web.whatsapp.com/send?phone='+d+'&text='+encodeURIComponent(text);
  window.open(url,'_blank');
}
function submitMessage(e,id){
  e.preventDefault();
  var body=(document.getElementById('msgBody').value||'').trim();
  var dir=document.getElementById('msgDir').value;
  if(!body){ toast('Enter what was discussed.','err'); return; }
  var btn=e.target.querySelector('button[type=submit]'); btn.disabled=true; btn.textContent='Saving…';
  api('addMessage',{CandidateID:id,Direction:dir,Body:body}).then(function(res){
    state.messages.push({MessageID:res.MessageID,CandidateID:id,Direction:res.Direction,Body:body,By:res.By,Timestamp:res.Timestamp});
    toast('Logged.'); openCandidate(id);
  }).catch(function(err){ btn.disabled=false; btn.textContent='Save to log'; toast(err.message||'Failed.','err'); });
}
function openEditCandidate(id){
  var c=null; for(var i=0;i<state.candidates.length;i++) if(state.candidates[i].CandidateID===id) c=state.candidates[i];
  if(!c) return;
  openModal('Edit Candidate',
    '<form id="editForm" onsubmit="submitEditCandidate(event,\''+id+'\')" class="stack">'+
      '<div class="field"><label>Name</label><input name="Name" id="e_name" value="'+esc(c.Name||'')+'"></div>'+
      '<div class="row2"><div class="field"><label>Phone</label><input name="Phone" id="e_phone" value="'+esc(String(c.Phone||''))+'"></div>'+
      '<div class="field"><label>Email</label><input name="Email" id="e_email" value="'+esc(c.Email||'')+'"></div></div>'+
      '<div class="row2"><div class="field"><label>Role Applied</label><input name="RoleApplied" value="'+esc(c.RoleApplied||'')+'"></div>'+
      '<div class="field"><label>Source</label><input name="Source" value="'+esc(c.Source||'')+'"></div></div>'+
      '<button class="btn btn-block" type="submit">Save Changes</button>'+
    '</form>');
}
function submitEditCandidate(e,id){
  e.preventDefault();
  var d=formData(e.target), ok=true;
  if(!d.Name||!d.Name.trim()){ fieldErr('e_name',true,'Name is required.'); ok=false; } else fieldErr('e_name',false);
  if(d.Email&&!validEmail(d.Email)){ fieldErr('e_email',true,'Enter a valid email.'); ok=false; } else fieldErr('e_email',false);
  if(d.Phone&&!validPhone(d.Phone)){ fieldErr('e_phone',true,'Enter a valid phone (7–15 digits).'); ok=false; } else fieldErr('e_phone',false);
  if(!d.Phone&&!d.Email){ fieldErr('e_email',true,'Provide a phone or an email.'); ok=false; }
  if(!ok) return;
  var btn=e.target.querySelector('button[type=submit]'); btn.disabled=true; btn.textContent='Saving…';
  api('updateCandidate',id,d).then(function(){
    for(var i=0;i<state.candidates.length;i++) if(state.candidates[i].CandidateID===id){
      state.candidates[i].Name=d.Name; state.candidates[i].Phone=d.Phone||''; state.candidates[i].Email=d.Email||'';
      state.candidates[i].RoleApplied=d.RoleApplied||''; state.candidates[i].Source=d.Source||'';
    }
    toast('Candidate updated.'); openCandidate(id); render(); refresh();
  }).catch(function(err){ btn.disabled=false; btn.textContent='Save Changes'; toast(err.message||'Failed.','err'); });
}
function changeStatus(id){
  var v=document.getElementById('newStatus').value;
  api('updateStatus',id,v).then(function(){
    for(var i=0;i<state.candidates.length;i++) if(state.candidates[i].CandidateID===id) state.candidates[i].Status=v;
    closeModal(); toast('Status updated.'); render(); refresh();
  }).catch(function(e){ toast(e.message||'Failed.','err'); });
}

// INTERVIEWS
function renderInterviews(m){
  if(!state.interviews.length){ m.innerHTML='<div class="card muted small" style="text-align:center">No interviews scheduled.</div>'; return; }
  var list=state.interviews.slice().sort(function(a,b){return new Date(b.DateTime)-new Date(a.DateTime);});
  m.innerHTML=list.map(function(iv){
    return '<div class="card" style="margin-bottom:10px"><div class="between"><strong>'+esc(iv.Round)+' Interview</strong>'+
      '<span class="muted tiny">'+fdate(iv.DateTime)+'</span></div>'+
      '<div class="muted small" style="margin-top:2px">Candidate: '+esc(nameOf(iv.CandidateID))+'</div>'+
      '<div class="small">'+esc(iv.Interviewer||'—')+' · '+esc(iv.Status||'—')+'</div>'+
      (iv.Feedback?'<div class="small" style="margin-top:4px;font-style:italic">'+esc(iv.Feedback)+'</div>':'')+
      (state.user.permissions.addFeedback?'<button class="btn btn-light btn-sm" style="margin-top:8px" onclick="openFeedback(\''+iv.InterviewID+'\')">Feedback</button>':'')+'</div>';
  }).join('');
}
function openInterview(candidateId){
  openModal('Schedule Interview',
    '<form onsubmit="submitInterview(event)" class="stack"><input type="hidden" name="CandidateID" value="'+candidateId+'">'+
      '<div class="field"><label>Round</label><select name="Round"><option>HR</option><option>Technical</option><option>Manager</option></select></div>'+
      '<div class="field"><label>Interviewer Email</label><input name="Interviewer" type="email" required></div>'+
      '<div class="field"><label>Date &amp; Time</label><input name="DateTime" type="datetime-local" required></div>'+
      '<div class="field"><label>Status</label><select name="Status"><option>Scheduled</option><option>Completed</option><option>Cancelled</option></select></div>'+
      '<button class="btn btn-block" type="submit">Save Interview</button></form>');
}
function submitInterview(e){
  e.preventDefault(); var d=formData(e.target);
  api('addInterview',d).then(function(res){
    state.interviews.push({ InterviewID:res.InterviewID, CandidateID:d.CandidateID, Round:d.Round, Interviewer:d.Interviewer,
      DateTime:d.DateTime, Status:d.Status||'Scheduled', Feedback:'', Score:'' });
    closeModal(); toast('Interview scheduled.'); refresh();
  }).catch(function(err){ toast(err.message||'Failed.','err'); });
}
function openFeedback(id){
  var iv=null; for(var i=0;i<state.interviews.length;i++) if(state.interviews[i].InterviewID===id) iv=state.interviews[i]; iv=iv||{};
  openModal('Interview Feedback',
    '<form onsubmit="submitFeedback(event)" class="stack"><input type="hidden" name="InterviewID" value="'+id+'">'+
      '<div class="field"><label>Score (1–10)</label><input name="Score" type="number" min="1" max="10" value="'+esc(iv.Score||'')+'"></div>'+
      '<div class="field"><label>Status</label><select name="Status"><option'+(iv.Status==='Completed'?' selected':'')+'>Completed</option>'+
        '<option'+(iv.Status==='Cancelled'?' selected':'')+'>Cancelled</option></select></div>'+
      '<div class="field"><label>Feedback</label><textarea name="Feedback" rows="4">'+esc(iv.Feedback||'')+'</textarea></div>'+
      '<button class="btn btn-block" type="submit">Save Feedback</button></form>');
}
function submitFeedback(e){
  e.preventDefault(); var d=formData(e.target);
  api('updateInterviewFeedback',d).then(function(){
    for(var i=0;i<state.interviews.length;i++) if(state.interviews[i].InterviewID===d.InterviewID){
      state.interviews[i].Feedback=d.Feedback; state.interviews[i].Score=d.Score; state.interviews[i].Status=d.Status; }
    closeModal(); toast('Feedback saved.'); render(); refresh();
  }).catch(function(err){ toast(err.message||'Failed.','err'); });
}

// ANALYTICS
function renderAnalytics(m){
  var mt=state.metrics, fn=mt.funnel||{new:0,screened:0,interviewed:0,selected:0};
  var max=Math.max(fn.new,1), w=function(v){return Math.max(8,Math.round((v/max)*100));};
  var rs=state.roleStats||[];
  m.innerHTML='<div class="grid">'+
      kpi('Screening %',mt.screeningRate||0,'🔎')+kpi('Interview→Sel %',mt.interviewConversionRate||0,'🏆')+kpi('Rejection %',mt.rejectionRate||0,'📉')+
    '</div>'+
    '<div class="card" style="margin-top:14px"><div class="section-title" style="margin:0 0 10px">Hiring Funnel</div>'+
      funnel('New',fn.new,w(fn.new))+funnel('Screened',fn.screened,w(fn.screened))+funnel('Interviewed',fn.interviewed,w(fn.interviewed))+funnel('Selected',fn.selected,w(fn.selected))+'</div>'+
    '<div class="card" style="margin-top:14px"><div class="section-title" style="margin:0 0 10px">Role vs Selected</div>'+
      (rs.length?rs.map(function(r){ var pct=Math.round((r.selected/(r.total||1))*100);
        return '<div style="margin-bottom:12px"><div class="between small"><span style="font-weight:600">'+esc(r.role)+'</span><span class="muted">'+r.selected+'/'+r.total+'</span></div>'+
          '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>';
      }).join(''):'<div class="muted small">No data.</div>')+'</div>';
}
function funnel(label,val,pct){ return '<div class="funnel"><span class="fl">'+label+'</span><div class="fb" style="width:'+pct+'%">'+(val||0)+'</div></div>'; }

// PROFILE
function renderProfile(m){
  var u=state.user, extra='';
  if(u.permissions.exportCsv) extra+='<button class="btn btn-light btn-block" onclick="exportCsv()">⬇ Export Candidates CSV</button>';
  if(u.permissions.manageUsers) extra+='<button class="btn btn-light btn-block" onclick="openUsers()">👥 Manage Users</button>';
  var tmpl='';
  if(u.permissions.editCandidate) tmpl='<div class="card" style="margin-top:14px"><div class="section-title" style="margin:0 0 8px">WhatsApp Message Template</div>'+
    '<div class="muted tiny" style="margin-bottom:6px">Placeholders: <b>{name}</b> candidate · <b>{role}</b> role · <b>{me}</b> your name.</div>'+
    '<textarea id="waTmpl" rows="12">'+esc(state.waTemplate||'')+'</textarea>'+
    '<button class="btn btn-block" style="margin-top:10px" onclick="saveWaTemplate()">Save Template</button></div>';
  m.innerHTML='<div class="card" style="text-align:center"><div class="logo" style="margin:0 auto 10px;width:64px;height:64px;font-size:28px">'+initials(u.name)+'</div>'+
      '<h3 style="margin:0;font-weight:800">'+esc(u.name)+'</h3><div class="muted small">'+esc(u.email)+'</div>'+
      '<span class="pill" style="margin-top:10px">'+esc(u.role)+'</span></div>'+
    '<div class="stack" style="margin-top:14px">'+extra+'</div>'+tmpl+
    '<div class="card" style="margin-top:14px"><div class="section-title" style="margin:0 0 6px">Permissions</div>'+
      Object.keys(u.permissions).map(function(k){ return '<div class="between small" style="padding:5px 0;border-bottom:1px solid #f1f5f9"><span>'+k+'</span><span>'+(u.permissions[k]?'✅':'—')+'</span></div>'; }).join('')+'</div>';
}
function saveWaTemplate(){
  var box=document.getElementById('waTmpl'); if(!box) return;
  var t=box.value;
  if(!t.trim()){ toast('Template cannot be empty.','err'); return; }
  api('setWaTemplate',t).then(function(res){
    state.waTemplate=(res&&res.waTemplate)||t; toast('Template saved.');
  }).catch(function(e){ toast(e.message||'Failed.','err'); });
}
function exportCsv(){
  api('exportCandidatesCsv').then(function(csv){
    var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='candidates.csv'; a.click();
  }).catch(function(e){ toast(e.message||'Failed.','err'); });
}
function openUsers(){
  api('getUsers').then(function(users){
    var body='<form onsubmit="addUserSubmit(event)" class="stack" style="margin-bottom:14px">'+
      '<div class="row2"><div class="field"><label>Name</label><input name="Name"></div>'+
      '<div class="field"><label>Email</label><input name="Email" type="email" required></div></div>'+
      '<div class="field"><label>Role</label><select name="Role"><option>Admin</option><option>HR</option><option>Interviewer</option><option>Viewer</option></select></div>'+
      '<button class="btn btn-block" type="submit">Add User</button></form>'+
      users.map(function(u){ return '<div class="between card" style="padding:10px 12px;margin-bottom:8px;box-shadow:none;border:1px solid var(--line)"><div class="small"><strong>'+esc(u.Name||'')+'</strong> · '+
        esc(u.Email)+' <span class="badge b-Interviewed">'+esc(u.Role)+'</span></div><button class="btn btn-danger btn-sm" onclick="removeUser(\''+u.UserID+'\')">🗑</button></div>'; }).join('');
    openModal('Manage Users',body);
  }).catch(function(e){ toast(e.message||'Failed.','err'); });
}
function addUserSubmit(e){ e.preventDefault(); api('addUser',formData(e.target)).then(function(){ toast('User added.'); openUsers(); }).catch(function(err){ toast(err.message||'Failed.','err'); }); }
function removeUser(id){ if(!confirm('Remove this user?')) return; api('deleteUser',id).then(function(){ toast('User removed.'); openUsers(); }).catch(function(e){ toast(e.message||'Failed.','err'); }); }

// ============================================================
// ICONS (inline SVG line icons for the bottom nav)
// ============================================================
var ICONS={
  home:'<svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5h13V10"/></svg>',
  people:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19.5a5.5 5.5 0 0 1 11 0"/><path d="M16.5 5.3a3 3 0 0 1 0 5.4"/><path d="M17.5 14.4a5.5 5.5 0 0 1 3 4.9"/></svg>',
  calendar:'<svg viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17M8 3v3M16 3v3"/><path d="M8.5 14.5l2.3 2.3 4-4.2"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M3 20.5h18"/><path d="M6 20.5v-6M11 20.5V8M16 20.5v-9"/></svg>',
  user:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>'
};
function paintIcons(){
  var spans=document.querySelectorAll('.ic[data-ic]');
  for(var i=0;i<spans.length;i++){ var n=spans[i].getAttribute('data-ic'); if(ICONS[n]) spans[i].innerHTML=ICONS[n]; }
}

// ============================================================
// AUTO-START
// ============================================================
paintIcons();
boot();
</script>
</body>
</html>
